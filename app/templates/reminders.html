<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>리마인드 로그 | 가천대학교 인공지능학과 길잡이</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <header class="top-nav">
        <div class="brand-area">
            <div class="brand-logo-wrap">
                <img src="/static/img/gachon_logo.png" alt="가천대학교 로고" class="brand-logo" />
            </div>
            <div>
                <h1>가천대학교 <span>인공지능학과 길잡이</span></h1>
                <p>예약된 리마인드 메일 상태를 확인할 수 있어요.</p>
            </div>
        </div>

        <nav class="nav-menu">
            <a href="/" class="nav-item">홈</a>
            <a href="/reminders" class="nav-item active">리마인드 로그</a>
        </nav>
    </header>

    <main class="reminder-page">
        <section class="reminder-card">
            <div class="reminder-header">
                <div>
                    <h2>리마인드 로그</h2>
                    <p>이 브라우저 세션에서 예약한 리마인드만 표시돼요. 창을 닫으면 목록은 사라집니다.</p>
                </div>
                <a href="/" class="back-link">채팅으로 돌아가기</a>
            </div>

            <div id="reminder-content">
                <div class="empty-reminder">불러오는 중…</div>
            </div>
        </section>
    </main>

    <script>
        (function () {
            // 채팅과 동일한 sessionStorage 키를 공유한다(app/static/chat.js).
            // 탭이 살아있는 동안만 유지되므로, 나갔다 새로 들어오면 새 세션 = 빈 로그.
            const SESSION_KEY = "gachon_chat_session_id";
            const sessionId = sessionStorage.getItem(SESSION_KEY);
            const container = document.getElementById("reminder-content");

            const STATUS_LABEL = { pending: "대기", sent: "발송됨", failed: "실패" };

            function fmt(dt) {
                if (!dt) return "-";
                return String(dt).replace("T", " ").slice(0, 16);
            }

            function esc(value) {
                const d = document.createElement("div");
                d.textContent = value == null ? "" : String(value);
                return d.innerHTML;
            }

            function renderEmpty(message) {
                container.innerHTML =
                    '<div class="empty-reminder">' + esc(message) + "</div>";
            }

            if (!sessionId) {
                renderEmpty("표시할 리마인드가 없습니다. 채팅에서 리마인드를 예약해 보세요.");
                return;
            }

            fetch("/api/reminders?session_id=" + encodeURIComponent(sessionId))
                .then((res) => {
                    if (!res.ok) throw new Error("bad status");
                    return res.json();
                })
                .then((data) => {
                    const items = (data && data.reminders) || [];
                    if (!items.length) {
                        renderEmpty("아직 등록된 리마인드가 없습니다.");
                        return;
                    }

                    const body = items
                        .map((it) => {
                            const status = esc(it.status);
                            const label = STATUS_LABEL[it.status] || status;
                            return (
                                "<tr>" +
                                '<td class="reminder-content">' + esc(it.content) + "</td>" +
                                "<td>" + esc(fmt(it.remind_at)) + "</td>" +
                                '<td><span class="status-badge status-' + status + '">' +
                                esc(label) + "</span></td>" +
                                "<td>" + esc(fmt(it.created_at)) + "</td>" +
                                "<td>" + esc(fmt(it.sent_at)) + "</td>" +
                                "</tr>"
                            );
                        })
                        .join("");

                    container.innerHTML =
                        '<div class="table-responsive"><table class="reminder-table">' +
                        "<thead><tr>" +
                        "<th>내용</th><th>예약 시간</th><th>상태</th>" +
                        "<th>생성 시간</th><th>발송 시간</th>" +
                        "</tr></thead><tbody>" + body + "</tbody></table></div>";
                })
                .catch(() => {
                    renderEmpty("리마인드를 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.");
                });
        })();
    </script>
</body>
</html>
