<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 학과 길잡이</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />

    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <div class="container py-4">
        <div class="app-header text-center mb-4">
            <h1>AI 학과 길잡이</h1>
            <p class="text-muted">
                가천대학교 인공지능학과 학생을 위한 학교생활 안내 Agent
            </p>
        </div>

        <div class="chat-container card shadow-sm">
            <div id="chat-box" class="chat-box card-body">
                <div class="message bot-message">
                    안녕하세요! 인공지능학과 학교생활 안내 Agent입니다.<br />
                    수강신청, 졸업요건, 전공 학습, 학사일정에 대해 질문해보세요.
                </div>
            </div>

            <div class="card-footer">
                <form id="chat-form" class="d-flex gap-2">
                    <input
                        id="message-input"
                        type="text"
                        class="form-control"
                        placeholder="예: 수강신청 일정 알려줘"
                        autocomplete="off"
                    />
                    <button type="submit" class="btn btn-primary">
                        전송
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="/static/chat.js"></script>
</body>
</html>
